name: build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependencies
        run: npm install

      - name: make
        run: npm run make

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: colour-diary-${{ matrix.os }}
          path: out/make/**/*